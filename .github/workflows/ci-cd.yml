name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test_backend: 
    name: Run Backend Tests
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Core API dependencies
        working-directory: ./core-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Core API Tests
        working-directory: ./core-api
        run: pytest

      - name: Install AI Service dependencies
        working-directory: ./ai-service
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run AI Service Tests
        working-directory: ./ai-service
        run: pytest  
  
  build-and-push:
    needs: [test_backend]
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    # These permissions are required to push to GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # This token is automatically provided by GitHub, no setup needed
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          # Only push the image if we are on the main branch (not just a PR)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/crm-frontend:latest

      - name: Build and push Core API
        uses: docker/build-push-action@v5
        with:
          context: ./core-api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/crm-core-api:latest

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/crm-ai-service:latest
    